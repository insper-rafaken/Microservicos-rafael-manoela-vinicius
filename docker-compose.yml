services:
  order-db:
    image: postgres:16
    environment:
      POSTGRES_DB: order
      POSTGRES_USER: order
      POSTGRES_PASSWORD: order123
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order -d order"]
      interval: 5s
      timeout: 5s
      retries: 10

  order:
    build:
      context: .
      dockerfile: api/order/order-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      DATABASE_HOST: order-db
      DATABASE_PORT: 5432
      DATABASE_DB: order
      DATABASE_USERNAME: order
      DATABASE_PASSWORD: order123
    depends_on:
      order-db:
        condition: service_healthy

  product-db:
    image: postgres:16
    environment:
      POSTGRES_DB: product
      POSTGRES_USER: product
      POSTGRES_PASSWORD: product123
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U product -d product"]
      interval: 5s
      timeout: 5s
      retries: 10

  product:
    build:
      context: .
      dockerfile: api/product/product-service/Dockerfile
    environment:
      DATABASE_HOST: product-db
      DATABASE_PORT: 5432
      DATABASE_DB: product
      DATABASE_USERNAME: product
      DATABASE_PASSWORD: product123
    depends_on:
      product-db:
        condition: service_healthy

  exchange:
    build:
      context: api/exchange/exchange
      dockerfile: Dockerfile
    ports:
      - "8082:8080"
    environment:
      AUTH_SERVICE_URL: http://auth:8080
      EXCHANGE_API_KEY: ${EXCHANGE_API_KEY:-}
    depends_on:
      - auth
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  account-db:
    image: postgres:17
    environment:
      POSTGRES_DB: store
      POSTGRES_USER: store
      POSTGRES_PASSWORD: store123
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U store -d store"]
      interval: 5s
      timeout: 5s
      retries: 10

  account:
    build:
      context: .
      dockerfile: api/account/account-service/Dockerfile
    hostname: account
    environment:
      DATABASE_HOST: account-db
      DATABASE_PORT: 5432
      DATABASE_DB: store
      DATABASE_USERNAME: store
      DATABASE_PASSWORD: store123
    depends_on:
      account-db:
        condition: service_healthy

  auth:
    build:
      context: .
      dockerfile: api/auth/auth-service/Dockerfile
    hostname: auth
    environment:
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_HTTP_ONLY: ${JWT_HTTP_ONLY:-true}
    depends_on:
      - account

  gateway:
    build:
      context: .
      dockerfile: api/gateway/gateway-service/Dockerfile
    hostname: gateway
    ports:
      - "8080:8080"
    environment:
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      CORS_ALLOWED_CREDENTIALS: ${CORS_ALLOWED_CREDENTIALS:-true}
    depends_on:
      - auth
