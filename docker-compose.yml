services:
  order-db:
    image: postgres:16
    environment:
      POSTGRES_DB: order
      POSTGRES_USER: order
      POSTGRES_PASSWORD: order123
    ports:
      - "5433:5432"

  order:
    build:
      context: .
      dockerfile: api/order-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      DATABASE_HOST: order-db
      DATABASE_PORT: 5432
      DATABASE_DB: order
      DATABASE_USERNAME: order
      DATABASE_PASSWORD: order123
    depends_on:
      - order-db

  product-db:
    image: postgres:16
    environment:
      POSTGRES_DB: product
      POSTGRES_USER: product
      POSTGRES_PASSWORD: product123
    ports:
      - "5434:5432"

  product:
    build:
      context: .
      dockerfile: api/product-service/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_HOST: product-db
      DATABASE_PORT: 5432
      DATABASE_DB: product
      DATABASE_USERNAME: product
      DATABASE_PASSWORD: product123
      SECURITY_USERNAME: admin
      SECURITY_PASSWORD: admin123
    depends_on:
      - product-db
